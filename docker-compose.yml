services:
  db:
    image: postgis/postgis:15-3.4
    container_name: pehel-db
    environment:
      POSTGRES_USER: pehel
      POSTGRES_PASSWORD: pehel
      POSTGRES_DB: pehel_neo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pehel -d pehel_neo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pehel-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: pehel-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pehelminio
      MINIO_ROOT_PASSWORD: pehelminio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  miniodata:
